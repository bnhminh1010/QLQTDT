name: CI - Backend

on:
  push:
    branches: [main, develop]
    paths: ['backend/**']
  pull_request:
    branches: [main, develop]
    paths: ['backend/**']

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'backend/QLQTDT.Api.csproj'

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: 'backend/**/*.csproj'

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release --no-incremental

      - name: Check formatting
        run: dotnet format ${{ env.PROJECT_PATH }} --verify-no-changes --no-restore

  security-scan:
    name: Security Scan
    needs: build-and-lint
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build for analysis
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release

      # CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@4d6150cc15f4cf6b68f0c4cff5ec0f020ad4bf5b # v3.28.14
        with:
          languages: csharp

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4d6150cc15f4cf6b68f0c4cff5ec0f020ad4bf5b # v3.28.14
        with:
          category: '/language:csharp'

      # Trivy - Dependency scan
      - name: Trivy dependency scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: 'backend/'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@4d6150cc15f4cf6b68f0c4cff5ec0f020ad4bf5b # v3.28.14
        with:
          sarif_file: 'trivy-results.sarif'

      # Gitleaks - Secret scan
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SonarQube - Code quality
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@bfd4e558cda28cda6b5defafb9232d191be8c203 # v4.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=QLQTDT-Backend
            -Dsonar.projectName=QLQTDT Backend
            -Dsonar.sources=backend/
            -Dsonar.exclusions=**/bin/**,**/obj/**,**/*.generated.cs
            -Dsonar.cs.file.suffixes=.cs
            -Dsonar.qualitygate.wait=false
